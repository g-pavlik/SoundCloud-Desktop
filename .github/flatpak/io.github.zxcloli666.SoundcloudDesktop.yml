app-id: io.github.zxcloli666.SoundcloudDesktop
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

command: soundcloud-desktop

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  # wayland
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
  # Discord RPC
  - --filesystem=xdg-run/discord-ipc-0
  - --filesystem=xdg-run/app/com.discordapp.Discord

build-options:
  append-path: /usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/soundcloud-desktop/cargo
    npm_config_nodedir: /usr/lib/sdk/node22

modules:
  - name: soundcloud-desktop
    buildsystem: simple
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/soundcloud-desktop/flatpak-node/cache
        npm_config_cache: /run/build/soundcloud-desktop/flatpak-node/npm-cache
        npm_config_offline: "true"
        NODE_OPTIONS: --max_old_space_size=4096
    build-commands:
      # Install node deps offline (npm, not pnpm — flatpak-node-generator doesn't support pnpm)
      - cd desktop && npm ci --offline --legacy-peer-deps
      # Patch beforeBuildCommand (pnpm not available in flatpak)
      - sed -i 's/"beforeBuildCommand":\s*".*"/"beforeBuildCommand": "true"/' desktop/src-tauri/tauri.conf.json
      # Build frontend
      - cd desktop && npx tsc && npx vite build
      # Fetch cargo crates from vendored sources
      - cargo --offline fetch --manifest-path desktop/src-tauri/Cargo.toml
      # Build Tauri binary
      - cd desktop && npx tauri build -b none
      # Install binary
      - install -Dm755 desktop/src-tauri/target/release/soundcloud-desktop /app/bin/soundcloud-desktop
      # Install icons
      - install -Dm644 desktop/src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/io.github.zxcloli666.SoundcloudDesktop.png
      - install -Dm644 desktop/src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.zxcloli666.SoundcloudDesktop.png
      - install -Dm644 desktop/src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/io.github.zxcloli666.SoundcloudDesktop.png
      # Install .desktop file
      - install -Dm644 .github/flatpak/io.github.zxcloli666.SoundcloudDesktop.desktop /app/share/applications/io.github.zxcloli666.SoundcloudDesktop.desktop
    sources:
      - type: dir
        path: ../../
      - cargo-sources.json
      - node-sources.json
